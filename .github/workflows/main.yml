name: AI Hero Bot

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-hero:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenAI SDK
        run: pip install openai

      - name: Run AI script safely (NO YAML HEREDOC)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 scripts/update_hero.py

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

          BRANCH="ai-hero-${{ github.run_id }}"
          git checkout -b $BRANCH

          git add components/hero.tsx
          git commit -m "AI hero update" || exit 0
          git push origin $BRANCH

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{
              \"title\": \"AI Hero Update\",
              \"head\": \"ai-hero-${{ github.run_id }}\",
              \"base\": \"main\",
              \"body\": \"Automated AI update\"
            }"
