name: AI Hero Bot

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-hero:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update hero with AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          from pathlib import Path

          file = Path("components/hero.tsx")
          content = file.read_text()

          prompt = f"""
You are a senior frontend engineer.

Return ONLY JSON:
{{
  "headline": "...",
  "subheadline": "...",
  "primary_cta": "...",
  "secondary_cta": "..."
}}

Make it better for a payment landing page.

Issue:
{os.environ["ISSUE_TITLE"]}
{os.environ["ISSUE_BODY"]}
"""

          req = urllib.request.Request(
              "https://api.openai.com/v1/responses",
              data=json.dumps({
                  "model": "gpt-4.1-mini",
                  "input": prompt
              }).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                  "Content-Type": "application/json"
              }
          )

          try:
              res = urllib.request.urlopen(req).read()
              data = json.loads(res)
              text = data["output"][0]["content"][0]["text"]
              start, end = text.find("{"), text.rfind("}") + 1
              ai = json.loads(text[start:end])
          except:
              ai = {
                  "headline": "Get approved faster with payments",
                  "subheadline": "Simple onboarding for merchants worldwide",
                  "primary_cta": "Get Started",
                  "secondary_cta": "Learn More"
              }

          content = content.replace(
              content.split("<h1")[1].split("</h1>")[0],
              f'h1>{ai["headline"]}<'
          )

          file.write_text(content)
          print("updated hero")
          PY

      - name: Create branch + commit
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

          branch="ai-hero-${{ github.run_id }}"
          git checkout -b $branch

          git add .
          git commit -m "AI hero update" || echo "no changes"
          git push origin $branch

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{
              \"title\": \"AI Hero Update\",
              \"head\": \"ai-hero-${{ github.run_id }}\",
              \"base\": \"main\",
              \"body\": \"Automated AI update\"
            }"
