name: AI PR Bot Stable

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read repo
        run: ls -R > repo.txt

      - name: Call OpenAI safely
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          PROMPT="You are a senior software engineer. Return ONLY valid JSON.
          Format:
          { \"files\": [ { \"path\": \"index.html\", \"content\": \"hello\" } ] }

          Repo:
          $(cat repo.txt)

          Issue:
          $ISSUE_TITLE
          $ISSUE_BODY"

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"gpt-4.1-mini\",\"input\":\"$PROMPT\"}")

          echo "$RESPONSE" > ai.json

      - name: Extract JSON
        run: |
          python3 - << 'EOF'
          import json

          raw = open("ai.json").read()
          start = raw.find("{")
          end = raw.rfind("}") + 1

          clean = raw[start:end]

          open("changes.json","w").write(clean)
          EOF

      - name: Apply changes
        run: |
          python3 - << 'EOF'
          import json, os

          data = json.load(open("changes.json"))

          for f in data.get("files", []):
              path = f["path"]
              content = f["content"]

              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
              open(path, "w").write(content)
          EOF

      - name: Create branch + commit
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@ai.com"

          git checkout -b ai-${{ github.run_id }}

          git add .
          git commit -m "AI patch" || echo "no changes"
          git push origin ai-${{ github.run_id }}

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/pulls \
          -d "{\"title\":\"AI Patch\",\"head\":\"ai-${{ github.run_id }}\",\"base\":\"main\"}"
