name: AI PR Bot Stable

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read repo structure
        run: ls -R > repo.txt

      - name: Call OpenAI safely
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          --data-binary @- <<EOF
{
  "model": "gpt-4.1-mini",
  "input": "You are a senior software engineer.\n\nReturn ONLY valid JSON.\nFormat:\n{ \"files\": [ { \"path\": \"index.html\", \"content\": \"updated content\" } ] }\n\nRepo:\n$(cat repo.txt)\n\nIssue Title:\n$ISSUE_TITLE\n\nIssue Body:\n$ISSUE_BODY"
}
EOF
)

          echo "$RESPONSE" > ai.json

      - name: Extract JSON safely
        run: |
          python3 - << 'EOF'
          import json

          raw = open("ai.json").read()

          start = raw.find("{")
          end = raw.rfind("}") + 1

          clean = raw[start:end]

          with open("changes.json", "w") as f:
              f.write(clean)
          EOF

      - name: Apply changes
        run: |
          python3 - << 'EOF'
          import json, os

          data = json.load(open("changes.json"))

          for file in data.get("files", []):
              path = file["path"]
              content = file["content"]

              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)

              with open(path, "w") as f:
                  f.write(content)
          EOF

      - name: Commit changes
        run: |
          git config user.name "AI Agent"
          git config user.email "ai@bot.com"

          git checkout -b ai-patch-${{ github.run_id }}

          git add .
          git commit -m "AI patch from issue" || echo "No changes"
          git push origin ai-patch-${{ github.run_id }}

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/pulls \
          -d "{
            \"title\": \"AI Patch: ${{ github.event.issue.title }}\",
            \"head\": \"ai-patch-${{ github.run_id }}\",
            \"base\": \"main\",
            \"body\": \"Automated AI code change\"
          }"
