name: AI Hero Bot

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-hero:
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Engine
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PY'
          import os, json, re, sys
          from pathlib import Path
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["GEMINI_API_KEY"],
              base_url="https://generativelanguage.googleapis.com/v1beta/openai/",
          )

          ISSUE_TITLE = os.getenv("ISSUE_TITLE", "")
          ISSUE_BODY = os.getenv("ISSUE_BODY", "")
          ISSUE_NUMBER = os.getenv("ISSUE_NUMBER", "")

          ROOT = Path(".").resolve()

          EXCLUDE_DIRS = {".git", ".github", "node_modules", "dist", "build", ".next"}
          ALLOWED_EXT = {".ts", ".tsx", ".js", ".jsx", ".css", ".json", ".md", ".html"}

          def safe_file(p: Path):
              return (
                  not any(part in EXCLUDE_DIRS for part in p.parts)
                  and p.suffix in ALLOWED_EXT
                  and ".." not in p.parts
              )

          def load_repo():
              data = {}
              total = 0
              for f in ROOT.rglob("*"):
                  if f.is_file():
                      rel = f.relative_to(ROOT)
                      if not safe_file(rel):
                          continue
                      try:
                          txt = f.read_text("utf-8")
                      except:
                          continue
                      if total + len(txt) > 400_000:
                          break
                      data[str(rel)] = txt
                      total += len(txt)
              return data

          repo = load_repo()

          repo_text = "\n\n".join(
              f"FILE: {k}\n{v}" for k, v in repo.items()
          )

          schema_prompt = f"""
          You are a senior frontend engineer.

          Return ONLY valid JSON:

          {{
            "summary": "...",
            "files": [
              {{
                "path": "file.tsx",
                "content": "FULL FILE CONTENT"
              }}
            ]
          }}

          RULES:
          - Modify only necessary files
          - Never touch .github or secrets
          - Keep style consistent
          - Output full file content only (no diffs)
          - If impossible: return {{ "summary": "...", "files": [] }}

          CONTEXT:
          {repo_text}

          ISSUE:
          Title: {ISSUE_TITLE}
          Body: {ISSUE_BODY}
          """

          def call_ai(prompt):
              res = client.chat.completions.create(
                  model="gemini-2.5-flash",
                  messages=[{"role": "user", "content": prompt}],
                  temperature=0.2,
              )
              return res.choices[0].message.content.strip()

          def parse_json(text):
              text = re.sub(r"```json|```", "", text).strip()
              try:
                  return json.loads(text)
              except:
                  return None

          result = None

          # retry logic (critical improvement)
          for attempt in range(2):
              raw = call_ai(schema_prompt)
              parsed = parse_json(raw)
              if parsed and isinstance(parsed, dict):
                  result = parsed
                  break

              schema_prompt += "\n\nIMPORTANT: output ONLY valid JSON. No extra text."

          if not result:
              result = {"summary": "failed to generate valid output", "files": []}

          changed = []

          for f in result.get("files", []):
              path = Path(f.get("path", ""))
              content = f.get("content", "")

              if not content or not path:
                  continue

              if not safe_file(path):
                  print("Blocked unsafe file:", path, file=sys.stderr)
                  continue

              full = (ROOT / path).resolve()

              if ROOT not in full.parents and full != ROOT:
                  continue

              full.parent.mkdir(parents=True, exist_ok=True)
              full.write_text(content, encoding="utf-8")
              changed.append(str(path))

          out = os.environ.get("GITHUB_OUTPUT")
          if out:
              with open(out, "a") as f:
                  f.write(f"changed={'true' if changed else 'false'}\n")
                  f.write(f"files={','.join(changed)}\n")
                  f.write(f"summary={result.get('summary','')}\n")

          print("DONE:", result.get("summary"))
          PY

      - name: Create Branch + Commit
        if: steps.ai.outputs.changed == 'true'
        id: commit
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          BRANCH="ai-hero-${{ github.run_id }}"
          git checkout -b "$BRANCH"

          git add -A
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "AI update #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.commit.outputs.pushed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "$(jq -n \
              --arg title "AI Hero Update" \
              --arg head "${{ steps.commit.outputs.branch }}" \
              --arg base "main" \
              --arg body "Auto-generated fix from Issue #${{ github.event.issue.number }}" \
              '{title:$title, head:$head, base:$base, body:$body}')"
