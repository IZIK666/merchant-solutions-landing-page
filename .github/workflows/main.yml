name: AI PR Agent

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create branch
        run: |
          git checkout -b ai-fix-${{ github.run_id }}

      - name: Analyze Issue with AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"gpt-4.1-mini\",
            \"input\": \"You are a senior software engineer.\\n\\nYou must propose exact code changes for this GitHub repository.\\n\\nIssue:\\nTitle: $ISSUE_TITLE\\nBody: $ISSUE_BODY\\n\\nReturn ONLY actionable file edits and code improvements.\"
          }")

          echo "$RESPONSE" > ai.json

      - name: Extract suggestion
        run: |
          cat ai.json

      - name: Commit placeholder change
        run: |
          echo "// AI update triggered" >> ai-update.txt
          git config user.name "AI Agent"
          git config user.email "ai@bot.com"
          git add .
          git commit -m "AI suggested update based on issue"
          git push origin ai-fix-${{ github.run_id }}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/pulls \
          -d "{
            \"title\": \"AI Fix: ${{ github.event.issue.title }}\",
            \"head\": \"ai-fix-${{ github.run_id }}\",
            \"base\": \"main\",
            \"body\": \"Automated PR generated by AI based on issue.\"
          }"
